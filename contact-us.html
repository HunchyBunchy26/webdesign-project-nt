<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Niconne&family=Quicksand&family=Sorts+Mill+Goudy:ital@0;1&family=Vast+Shadow&display=swap">
</head>
<body>
    <header>
        <div class="flag-title">
            <img class="flag" src="images/flag.jpg" alt="">
            <h1>Welcome to Daugavpils</h1>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="useful-information.html">Useful Information</a>
            <a href="contact-us.html">Contact Us</a>
        </nav>
    </header>

 <main>
        <form method="post" action="#">

            <fieldset>
                <legend>Contact Information</legend>
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Please type your full name" required>

                <label for="Email">Email</label>
                <input
                    type="email"
                    id="Email"
                    placeholder="Please insert a valid email address" 
                    aria-describedby="emailhelp"
                    required>

                <small id="emailhelp">We will never share your email.</small>

                <label for="subject">Subject</label>
                <input
                    type="text"
                    id="subject"
                    placeholder="Reason for Contact"
                    pattern="{A-Za-z }+"
                    aria-describedby="subjectHelp"
                    required>

                <small id="subjectHelp">This input accepts only letters and spaces.</small>

                <label for="message">Message</label>
                <textarea
                    id="message"
                    placeholder="Enter your message here"
                    rows="20"
                    required>
                </textarea>

                <button class="formbutton" type="submit">Send</button>
            </fieldset>

        </form>

    </main>

    <footer>
        &copy; 2026 Visit Daugavpils by Natalija Tiron. All rights reserved.
    </footer>
</body>
</html>
